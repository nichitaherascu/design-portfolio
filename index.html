<html data-type="html" data-identifier="99f371d7-370d-43a1-88ea-05dcb79155fa" data-title="Nichita Herascu — Entry" data-version="5" width="1200" height="800"><head>
    <meta charset="UTF-8">
    <title>Nichita Herascu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet">
    <script src="main.js" defer=""></script>
    <script src="index.js" defer=""></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #0a0a0a;
            --white: #ffffff;
        }

        body {
            background: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            user-select: none;
            overflow: hidden;
            cursor: none;
        }

        /* ── Custom cursor ───────────────── */
        #cursor {
            position: fixed;
            width: 7px; height: 7px;
            background: var(--black);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            transition: width .25s ease, height .25s ease,
                        background .25s ease, border .25s ease;
        }
        #cursor.hovered {
            width: 34px; height: 34px;
            background: transparent;
            border: 1px solid var(--black);
        }

        /* ── Entrance animations ─────────── */
        [data-anim] {
            opacity: 0;
            transform: translateY(14px);
            transition: opacity .7s ease, transform .7s ease;
        }
        [data-anim].in {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Entry wrapper ───────────────── */
        .entry-wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px 24px 18px;
            border-radius: 8px;
            cursor: none;
            transition: background 0.15s ease;
        }
        .entry-wrapper:hover {
            background: rgba(50, 110, 215, 0.07);
        }

        /* ── Black square ────────────────── */
        .black-square {
            width: 120px; height: 120px;
            background: var(--black);
            transition: transform .4s cubic-bezier(.25,.46,.45,.94);
        }
        .entry-wrapper:hover .black-square {
            transform: scale(0.7);
        }
        .entry-wrapper.opening .black-square {
            animation: openOut .35s cubic-bezier(.4,0,.2,1) forwards;
        }
        @keyframes openOut {
            0%   { transform: scale(0.7); opacity: 1; }
            100% { transform: scale(0.4); opacity: 0; }
        }

        /* ── Label ───────────────────────── */
        .entry-label {
            color: var(--black);
            font-size: 12.5px;
            font-weight: 400;
            letter-spacing: 0.01em;
            text-align: center;
        }

        /* ── Hint ────────────────────────── */
        .hint {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(0,0,0,0.20);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="entry-wrapper" id="entry">
        <div class="black-square" data-anim=""></div>
        <span class="entry-label" data-anim="">Nichita_Herascu_Projects (2020–2026)</span>
    </div>

    <p class="hint" data-anim="">Click to open</p>


</body></html>
