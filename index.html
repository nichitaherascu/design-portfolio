<html data-type="html" data-identifier="99f371d7-370d-43a1-88ea-05dcb79155fa" data-title="index.html — Entry Page" data-version="8" width="1200" height="800"><head>
    <meta charset="UTF-8">
    <title>Nichita Herascu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer=""></script>
    <script src="index.js" defer=""></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            background: var(--white);
        }

        .entry-wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px 24px 18px;
            border-radius: 8px;
            cursor: none;
            transition: background 0.15s ease;
        }
        .entry-wrapper:hover { background: rgba(50, 110, 215, 0.07); }

        /* ── Black square ────────────────── */
        .black-square {
            width: 120px; height: 120px;
            background: var(--black);
            /* hover shrink — expansion is handled in JS */
            transition: transform .4s cubic-bezier(.25,.46,.45,.94);
        }
        .entry-wrapper:hover .black-square { transform: scale(0.7); }

        .entry-label {
            color: var(--black);
            font-size: 12.5px; font-weight: 400;
            letter-spacing: 0.01em; text-align: center;
            transition: opacity .25s ease;
        }

        .hint {
            position: fixed;
            bottom: 36px; left: 50%;
            transform: translateX(-50%);
            font-size: 11px; color: rgba(0,0,0,0.20);
            letter-spacing: 0.1em; text-transform: uppercase;
            white-space: nowrap;
            transition: opacity .25s ease;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="entry-wrapper" id="entry">
        <div class="black-square" id="square" data-anim=""></div>
        <span class="entry-label" id="entry-label" data-anim="">Nichita_Herascu_Projects (2020–2026)</span>
    </div>

    <p class="hint" id="hint" data-anim="">Click to open</p>


</body></html>
