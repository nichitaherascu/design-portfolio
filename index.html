<html data-type="html" data-identifier="99f371d7-370d-43a1-88ea-05dcb79155fa" data-title="Nichita Herascu — Entry" data-version="3" width="1200" height="800"><head>
    <meta charset="UTF-8">
    <title>Nichita Herascu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', -apple-system, sans-serif;
            user-select: none;
            overflow: hidden;
        }

        .folder-wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 20px 24px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.18s ease;
        }

        .folder-wrapper:hover {
            background: rgba(50, 110, 215, 0.08);
        }

        /* ── FOLDER ICON ── */
        .folder-icon {
            position: relative;
            width: 140px;
            height: 108px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.10));
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        filter 0.35s ease;
        }

        .folder-wrapper:hover .folder-icon {
            transform: translateY(-3px);
            filter: drop-shadow(0 10px 24px rgba(0,0,0,0.14));
        }

        /* Tab — sits above the front cover in z-order */
        .f-tab {
            position: absolute;
            top: 0; left: 0;
            width: 56px;
            height: 26px;
            background: #C98010;
            border-radius: 8px 8px 0 0;
            z-index: 3;
        }

        /* Back body — revealed when front opens */
        .f-back {
            position: absolute;
            top: 22px; left: 0;
            width: 140px;
            height: 86px;
            background: #C98010;
            border-radius: 9px;
            z-index: 1;
        }

        /* Front cover — the flat face that opens on hover */
        .f-front {
            position: absolute;
            top: 22px; left: 0;
            width: 140px;
            height: 86px;
            background: #F5C03A;
            border-radius: 9px;
            z-index: 2;
            transform-origin: 50% 100%;
            transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .folder-wrapper:hover .f-front {
            transform: perspective(480px) rotateX(-24deg);
        }

        /* Opening animation on click */
        .folder-wrapper.opening .folder-icon {
            animation: openOut 0.38s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes openOut {
            0%   { transform: scale(1) translateY(-3px); opacity: 1; }
            45%  { transform: scale(1.08) translateY(-6px); opacity: 1; }
            100% { transform: scale(0.85) translateY(0); opacity: 0; }
        }

        /* Label */
        .folder-label {
            color: #0a0a0a;
            font-size: 12.5px;
            font-weight: 400;
            letter-spacing: 0.01em;
            text-align: center;
        }

        .hint {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-family: 'DM Sans', sans-serif;
            color: rgba(0,0,0,0.20);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="folder-wrapper" id="folder">
        <div class="folder-icon">
            <div class="f-tab"></div>
            <div class="f-back"></div>
            <div class="f-front"></div>
        </div>
        <span class="folder-label">Nichita_Herascu_Projects (2020–2026)</span>
    </div>

    <p class="hint">Click to open</p>

    <script>
        const folder = document.getElementById('folder');

        folder.addEventListener('click', function () {
            folder.classList.add('opening');
            setTimeout(function () {
                window.location.href = 'home.html';
            }, 340);
        });
    </script>


</body></html>
