    <style>
        html { background: #fff; }
        html, body { width: 100%; height: 100%; overflow: hidden; }

        /* ── Nav ─────────────────────────── */
        .page-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; background: var(--white); z-index: 100;
        }
        .page-nav-logo {
            font-size: 13px; font-weight: 500; letter-spacing: .06em;
            text-transform: uppercase; color: var(--black);
            text-decoration: none; transition: opacity .2s;
        }
        .page-nav-logo:hover { opacity: .45; }
        .page-nav-ig {
            font-size: 12px; font-weight: 400; color: var(--gray);
            text-decoration: none; letter-spacing: .04em; transition: color .2s;
        }
        .page-nav-ig:hover { color: var(--black); }

        /* ── Layout ──────────────────────── */
        .proj-page {
            position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
            display: grid; grid-template-columns: 380px 1fr;
        }

        /* ── Sidebar ─────────────────────── */
        .proj-sidebar {
            height: 100%; display: flex; flex-direction: column;
            background: var(--white); overflow: hidden;
        }
        .sidebar-top { padding: 28px 32px 0; flex-shrink: 0; }
        .proj-page-title {
            font-size: clamp(22px, 2.4vw, 34px); font-weight: 700;
            text-transform: uppercase; letter-spacing: -.02em;
            line-height: 1.0; margin-bottom: 20px;
        }
        .proj-nav-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 11px 0;
        }
        .proj-nav-link {
            font-size: 12px; font-weight: 400; color: var(--black);
            text-decoration: none; letter-spacing: .05em;
            text-transform: uppercase; transition: opacity .2s;
        }
        .proj-nav-link:hover { opacity: .35; }
        .proj-tags {
            font-size: 11px; font-weight: 300; color: var(--gray);
            letter-spacing: .03em; padding: 11px 0;
        }
        .sidebar-body { flex: 1; padding: 28px 32px 0; overflow: hidden; }
        .proj-desc p {
            font-size: 13px; font-weight: 300; color: var(--gray);
            line-height: 1.8; margin-bottom: 14px;
        }
        .sidebar-bottom { padding: 16px 32px 28px; flex-shrink: 0; }
        .client-meta {
            font-size: 11px; font-weight: 300; color: var(--gray); line-height: 1.8;
        }

        /* ── Scrollable right panel ──────── */
        .proj-content {
            height: 100%; overflow-y: scroll;
            scrollbar-width: none; background: #0f0f0f;
        }
        .proj-content::-webkit-scrollbar { display: none; }

        /* ── Image grid ──────────────────── */
        .image-grid { display: flex; flex-direction: column; gap: 3px; padding: 20px; }

        .img-row-full { width: 100%; }
        .img-row-full .img-block {
            width: 100%; aspect-ratio: 16 / 9;
            display: block; border-radius: 0;
        }
        .img-row-half { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
        .img-row-half .img-block {
            width: 100%; aspect-ratio: 3 / 2;
            display: block; border-radius: 0;
        }

        /* ── Image fade in on scroll ─────── */
        .img-block {
            position: relative;
            opacity: 0; transform: translateY(20px);
            transition: opacity .65s ease, transform .65s ease;
            user-select: none;
        }
        .img-block.img-visible { opacity: 1; transform: translateY(0); }
        .img-row-half .img-block:nth-child(2) { transition-delay: .1s; }

        /* ── Transparent overlay ─────────── */
        .img-block::after {
            content: ''; position: absolute; inset: 0;
            z-index: 2; cursor: none !important;
        }
        .img-block img {
            display: block; width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
            user-select: none; -webkit-user-drag: none;
        }

        .proj-content .site-footer { margin-top: 3px; }


        /* ═══════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════ */

        /* ── Tablet (≤ 1024px) ───────────── */
        @media (max-width: 1024px) {
            .proj-page { grid-template-columns: 260px 1fr; }
            .sidebar-top  { padding: 20px 24px 0; }
            .sidebar-body { padding: 20px 24px 0; }
            .sidebar-bottom { padding: 12px 24px 24px; }
            .page-nav { padding: 0 24px; }
        }

        /* ── Mobile (≤ 768px) ────────────── */
        @media (max-width: 768px) {

            /* Let the page scroll naturally */
            html, body { overflow: auto !important; height: auto !important; }

            .page-nav { padding: 0 20px; }

            /* Stack sidebar above content */
            .proj-page {
                position: static !important;
                display: flex;
                flex-direction: column;
            }

            .proj-sidebar {
                height: auto;
                overflow: visible;
                border-bottom: 1px solid var(--dim);
            }
            .sidebar-top   { padding: 24px 20px 0; }
            .sidebar-body  { flex: none; overflow: visible; padding: 16px 20px 0; }
            .sidebar-bottom { padding: 12px 20px 20px; }

            /* Content panel becomes normal flow */
            .proj-content {
                height: auto;
                overflow: visible;
            }

            .image-grid { padding: 12px; }
        }

        /* ── Small phones (≤ 480px) ──────── */
        @media (max-width: 480px) {
            /* Half-rows collapse to single column */
            .img-row-half { grid-template-columns: 1fr; gap: 3px; }
            .img-row-half .img-block { aspect-ratio: 16 / 9; }
        }
    </style>
</head>
