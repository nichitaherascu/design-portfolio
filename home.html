<html data-type="html" data-identifier="bc76ed2e-8895-4356-9b32-fb24d8e9389d" data-title="Nichita Herascu — Home" data-version="4" width="1200" height="800"><head>
    <meta charset="UTF-8">
    <title>Nichita Herascu — Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,900;1,9..40,300&amp;display=swap" rel="stylesheet">
    <script src="main.js" defer=""></script>
    <script src="home.js" defer=""></script>
    <style>
        /* ── Reset ───────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #0a0a0a;
            --gray:  #b0b0b0;
            --dim:   #d4d4d4;
            --white: #ffffff;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--white);
            font-family: 'DM Sans', sans-serif;
            color: var(--black);
            cursor: none;
        }

        /* ── Custom cursor ───────────────── */
        #cursor {
            position: fixed;
            width: 7px; height: 7px;
            background: var(--black);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            transition: width .25s ease, height .25s ease,
                        background .25s ease, border .25s ease;
        }
        #cursor.hovered {
            width: 34px; height: 34px;
            background: transparent;
            border: 1px solid var(--black);
        }

        /* ── Entrance animations ─────────── */
        [data-anim] {
            opacity: 0;
            transform: translateY(14px);
            transition: opacity .7s ease, transform .7s ease;
        }
        [data-anim].in {
            opacity: 1;
            transform: translateY(0);
        }
        [data-anim="rise"] {
            transform: translateY(70px);
            transition: opacity .9s cubic-bezier(.16,1,.3,1),
                        transform .9s cubic-bezier(.16,1,.3,1);
        }
        [data-anim="rise"].in { transform: translateY(0); }

        /* ── Nav left ────────────────────── */
        .nav-left {
            position: fixed;
            top: 32px; left: 38px;
            z-index: 20;
        }
        .nav-logo {
            display: block;
            font-size: 13px; font-weight: 400;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--black);
            text-decoration: none;
            margin-bottom: 5px;
        }
        .nav-role {
            display: block;
            font-size: 11px; font-weight: 300;
            color: var(--gray);
            letter-spacing: .04em;
            margin-bottom: 22px;
        }
        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .nav-links li {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-links .num {
            font-size: 10px; font-weight: 300;
            color: var(--dim);
            letter-spacing: .05em;
        }
        .nav-links a {
            font-size: 13px; font-weight: 300;
            color: var(--gray);
            text-decoration: none;
            letter-spacing: .06em;
            text-transform: uppercase;
            transition: color .2s;
        }
        .nav-links a:hover { color: var(--black); }

        /* ── Nav right ───────────────────── */
        .nav-right {
            position: fixed;
            top: 34px; right: 38px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 26px;
        }
        .nav-city {
            font-size: 11px; font-weight: 300;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--gray);
        }
        .nav-socials { display: flex; align-items: center; }
        .nav-socials a {
            font-size: 12px; font-weight: 500;
            color: var(--black);
            text-decoration: none;
            letter-spacing: .05em;
            text-transform: uppercase;
            transition: opacity .2s;
        }
        .nav-socials a:hover { opacity: .4; }
        .nav-socials .sep {
            font-size: 12px; font-weight: 300;
            color: var(--dim); margin: 0 6px;
        }

        /* ── Portrait blob ───────────────── */
        .portrait {
            position: fixed;
            top: 44%; left: 50%;
            transform: translate(-50%, -50%);
            width: 330px; height: 460px;
            pointer-events: none;
            z-index: 1;
            will-change: transform;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
        }
        .blob-face {
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%,
                rgba(216,172,122,.92) 0%,
                rgba(204,156,104,.56) 28%,
                rgba(190,142,92,.2)  56%,
                transparent 76%);
            filter: blur(46px);
        }
        .blob-hair {
            top: -20px; left: 15%; right: 15%; height: 48%;
            background: radial-gradient(ellipse at 50% 10%,
                rgba(155,112,72,.52) 0%,
                transparent 68%);
            filter: blur(34px);
        }
        .blob-neck {
            bottom: -20px; left: 25%; right: 25%; height: 35%;
            background: radial-gradient(ellipse at 50% 0%,
                rgba(205,158,106,.44) 0%,
                transparent 70%);
            filter: blur(30px);
        }

        /* ── Bottom name ─────────────────── */
        .name-wrap {
            position: fixed;
            bottom: -.07em; left: 0; right: 0;
            line-height: 1;
            z-index: 2;
        }
        #big-name {
            display: block;
            font-weight: 900;
            letter-spacing: -.025em;
            text-transform: uppercase;
            color: var(--black);
            white-space: nowrap;
            line-height: .86;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <!-- Nav left -->
    <nav class="nav-left">
        <a href="home.html" class="nav-logo" data-anim="">Nichita Herascu</a>
        <span class="nav-role" data-anim="">Graphic Designer &amp; Art Director</span>
        <ul class="nav-links">
            <li data-anim=""><span class="num">01</span><a href="projects.html">Projects</a></li>
            <li data-anim=""><span class="num">02</span><a href="about.html">About</a></li>
            <li data-anim=""><span class="num">03</span><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Nav right -->
    <div class="nav-right">
        <span class="nav-city" data-anim="">B U C H A R E S T</span>
        <div class="nav-socials" data-anim="">
            <a href="#">Instagram</a>
            <span class="sep">|</span>
            <a href="#">Behance</a>
        </div>
    </div>

    <!-- Portrait -->
    <div id="portrait" class="portrait" data-anim="">
        <div class="blob blob-hair"></div>
        <div class="blob blob-face"></div>
        <div class="blob blob-neck"></div>
    </div>

    <!-- Massive name -->
    <div class="name-wrap">
        <span id="big-name" data-anim="rise">Nichita Herascu</span>
    </div>


</body></html>
